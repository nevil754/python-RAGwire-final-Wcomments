loader:
  extensions: [".pdf", ".docx", ".xlsx", ".pptx", ".txt", ".md"]

splitter:
  chunk_size: 1000
  chunk_overlap: 200
  strategy: "markdown"

embeddings:
  provider: "ollama"
  model: "nomic-embed-text:latest"  #magari posso anche usare qua un modello di gemini(google)
  base_url: "http://localhost:11434"

llm:
  provider: "ollama" #"openai" #"google"   
  model: "tinyllama:latest" #"gpt-4.1-mini" #"gemini-2.0-flash"
  #api_key: "${GOOGLE_API_KEY}"  #ora gestito da 'settings.py'
  num_ctx: 2048

metadata:
  config_file: "./v1metadata.yaml"

vectorstore:
  url: "http://localhost:6333"
  collection_name: "version1prjRAG-collection"
  use_sparse: true
  force_recreate: false

retriever:
  search_type: "hybrid"
  retrieval_strategy: "mmr"
  top_k: 3
  auto_filter: false

logging: 
  level: "INFO"
  console_output: true
  colored: true

